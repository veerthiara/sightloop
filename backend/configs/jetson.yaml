session_name: jetson-session
environment: jetson

camera:
  source: "${TAPO_RTSP_URL}"
  width: 1920
  height: 1080
  fps: 30

output:
  frames_dir: artifacts/frames
  clips_dir: artifacts/clips
  logs_dir: artifacts/logs
  image_extension: jpg

debug:
  enabled: true
  output_dir: artifacts/frames
  save_every_n_frames: 60
  display_enabled: false
  metrics_log_interval_secs: 30.0
  image_extension: jpg

detection:
  enabled: true
  model_name: yolov8m.pt
  candidate_models:
    - yolov8n.pt
    - yolov8s.pt
    - yolov8m.pt
  confidence_threshold: 0.25
  classes:
    - person
    - bottle
    - cup
  run_every_n_frames: 30
  output_dir: artifacts/detections
  image_extension: png
  zones:
    - name: bottle_home
      type: rectangle
      x1: 750
      y1: 350
      x2: 1150
      y2: 550
    - name: desk
      type: rectangle
      x1: 814
      y1: 473
      x2: 1561
      y2: 1070

tracking:
  enabled: true
  output_dir: artifacts/tracking
  max_missed_frames: 30
  match_distance_threshold: 100.0

calibration:
  output_dir: artifacts/calibration
  image_extension: jpg